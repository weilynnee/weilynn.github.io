<!DOCTYPE html>
<html>
<head>
  <title>Wei Lynn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Helvetica, Arial, sans-serif;
      overflow-x: hidden;
    }

    section {
      height: 100vh;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    /* HERO */
    .hero h1 {
      font-size: 110px;
      letter-spacing: 4px;
    }

    .hero img {
      position: absolute;
      width: 220px;
    }

    .img1 { top: 15%; right: 10%; }
    .img2 { bottom: 10%; left: 20%; width: 350px; }
    .img3 { bottom: 20%; right: 15%; width: 250px; }

    /* STATEMENT */
    .statement {
      align-items: flex-start;
      padding-top: 30vh;
    }

    .statement h2 {
      font-size: 50px;
      text-align: left;
      line-height: 1.3;
      max-width: 600px;
    }

    .statement img {
      position: absolute;
      bottom: 15%;
      width: 400px;
      opacity: 0.9;
    }

    #movingText {
      transition: transform 0.1s ease-out;
    }

    /* QUOTE */
    .quote {
      flex-direction: column;
      align-items: flex-end;
      text-align: right;
      padding-right: 15%;
    }

    .quote p {
      font-size: 20px;
      max-width: 500px;
    }

    .quote span {
      margin-top: 20px;
      font-size: 12px;
      color: #888;
    }

    /* BRAND */
    .brand h1 {
      font-size: 90px;
    }

    .brand p {
      font-size: 30px;
      margin-top: 10px;
    }

    .brand img {
      position: absolute;
      width: 120px;
    }

    .brand-img1 { top: 20%; right: 20%; }
    .brand-img2 { bottom: 25%; right: 10%; }

    /* subtle glow */
    section::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(255,255,255,0.05), transparent 70%);
      pointer-events: none;
    }

  </style>
</head>

<body>

<!-- SECTION 1 -->
<section class="hero">
  <h1>A NOBODY</h1>

  <img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba6" class="img1">
  <img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b" class="img2">
  <img src="https://images.unsplash.com/photo-1593032465171-8f57b6c9a3b6" class="img3">
</section>

<!-- SECTION 2 -->
<section class="statement">
  <h2 id="movingText">
    I MAKE THINGS<br>
    THE WAY I THINK<br>
    THEY SHOULD BE MADE
  </h2>

  <img src="https://images.unsplash.com/photo-1590080876095-cbb4a4b3d74f">
</section>

<!-- SECTION 3 -->
<section class="quote">
  <p>
    “A brand isn’t what you show — it’s what people feel when you’re gone.”
  </p>
  <span>— UNKNOWN</span>
</section>

<!-- SECTION 4 -->
<section class="brand">
  <h1>NEWMAN</h1>
  <p>STRENGTH STARTS NOW</p>

  <img src="https://images.unsplash.com/photo-1600181952155-2e0cbb8e2e1c" class="brand-img1">
  <img src="https://images.unsplash.com/photo-1600181952250-bc7a7f4c8e8e" class="brand-img2">
</section>

<script>
window.addEventListener("scroll", function() {
  const section = document.querySelector(".statement");
  const text = document.getElementById("movingText");

  const rect = section.getBoundingClientRect();
  const windowHeight = window.innerHeight;

  if (rect.top < windowHeight && rect.bottom > 0) {
    let progress = (windowHeight - rect.top) / windowHeight;

    text.style.transform = `translateY(${progress * 120}px)`;
  }
});
</script>

</body>
</html>
