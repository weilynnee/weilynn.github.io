<!DOCTYPE html>
<html>
<head>
  <title>Wei Lynn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Helvetica, Arial, sans-serif;
      overflow-x: hidden;
    }

    section {
      height: 100vh;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    /* ================= HERO ================= */
    .hero h1 {
      font-size: 110px;
      letter-spacing: 4px;
      position: relative;
      z-index: 2;
    }

    .hero img {
      position: absolute;
      z-index: 1;
      object-fit: cover;
      filter: grayscale(100%) contrast(110%);
      opacity: 0.9;
      transition: transform 0.2s ease-out;
    }

    /* MAIN IMAGE */
    .img1 {
      width: 460px;
      bottom: 5%;
      left: 50%;
    }

    /* SMALL TOP */
    .img2 {
      width: 180px;
      top: 12%;
      right: 12%;
    }

    /* MEDIUM RIGHT */
    .img3 {
      width: 260px;
      bottom: 10%;
      right: 8%;
    }

    /* ================= STATEMENT ================= */
    .statement {
      height: 180vh;
      align-items: flex-start;
      padding-top: 40vh;
      overflow: hidden;
    }

    .statement h2 {
      font-size: 40px;
      text-align: left;
      line-height: 1.3;
      max-width: 600px;
    }

    #movingText {
      will-change: transform;
    }

    /* ================= QUOTE ================= */
    .quote {
      height: 45vh;
      flex-direction: column;
      justify-content: center;
      align-items: flex-end;
      text-align: right;
      padding-right: 15%;
    }

    .quote p {
      font-size: 20px;
      max-width: 500px;
    }

    .quote span {
      margin-top: 20px;
      font-size: 12px;
      color: #888;
    }

    /* ================= BRAND ================= */
    .brand h1 {
      font-size: 90px;
    }

    .brand p {
      font-size: 30px;
      margin-top: 10px;
    }

    /* glow */
    section::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(255,255,255,0.05), transparent 70%);
      pointer-events: none;
    }
  </style>
</head>

<body>

<!-- SECTION 1 -->
<section class="hero">
  <h1>A NOBODY</h1>

  <img src="https://images.unsplash.com/photo-1520975922203-bc1cfae3f3b3?q=80&w=800" class="img1">
  <img src="https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=600" class="img2">
  <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?q=80&w=600" class="img3">
</section>

<!-- SECTION 2 -->
<section class="statement">
  <h2 id="movingText">
    I MAKE THINGS<br>
    THE WAY I THINK<br>
    THEY SHOULD BE MADE
  </h2>
</section>

<!-- SECTION 3 -->
<section class="quote">
  <p>
    “A brand isn’t what you show — it’s what people feel when you’re gone.”
  </p>
  <span>— UNKNOWN</span>
</section>

<!-- SECTION 4 -->
<section class="brand">
  <h1>NEWMAN</h1>
  <p>STRENGTH STARTS NOW</p>
</section>

<!-- SECTION 5 -->
<section class="brand">
  <h1>MYLO'S</h1>
  <p>BUILT WITH HEART</p>
</section>

<!-- SECTION 6 -->
<section class="brand">
  <h1>JUMPING FOX</h1>
  <p>MOVE FAST. STAY SHARP.</p>
</section>

<!-- ================= PARALLAX ================= -->
<script>
function clamp(value, min, max) {
  return Math.min(Math.max(value, min), max);
}

function updateParallax() {
  const section = document.querySelector(".statement");
  const text = document.getElementById("movingText");

  const img1 = document.querySelector(".img1");
  const img2 = document.querySelector(".img2");
  const img3 = document.querySelector(".img3");

  const rect = section.getBoundingClientRect();
  const windowHeight = window.innerHeight;

  const progress = (windowHeight - rect.top) / windowHeight;
  const sectionScroll = clamp(-rect.top, 0, section.offsetHeight);
  const scrollRange = Math.max(section.offsetHeight - windowHeight, 1);
  const normalizedScroll = clamp(sectionScroll / scrollRange, 0, 1);
  const easedScroll = 1 - Math.pow(1 - normalizedScroll, 2);
  const maxTextTravel = Math.max(section.offsetHeight - text.offsetHeight - 80, 0);
  const textTravel = easedScroll * maxTextTravel;

  /* TEXT */
  text.style.transform = `translateY(${textTravel}px)`;

  /* IMAGES */
  img1.style.transform = `translate(-50%, ${progress * 40}px)`;
  img2.style.transform = `translateY(${progress * -60}px)`;
  img3.style.transform = `translateY(${progress * -30}px)`;

}

let ticking = false;
window.addEventListener("scroll", function() {
  if (!ticking) {
    window.requestAnimationFrame(function() {
      updateParallax();
      ticking = false;
    });
    ticking = true;
  }
}, { passive: true });

window.addEventListener("resize", updateParallax);
updateParallax();
</script>

</body>
</html>
